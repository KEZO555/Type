name: Release

# Builds a signed release APK and attaches it to a GitHub Release whenever a version
# tag (e.g. v0.1.0) is pushed. Obtainium watches this repo's Releases and picks up the APK.
on:
  push:
    tags:
      - 'v*'
  # Manual fallback for environments that can't push tags: the release action
  # creates the tag itself at the dispatched ref.
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to release, e.g. v2.4.0'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.jks"

      - name: Build signed release APK
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease

      - name: Stage APK
        env:
          VERSION: ${{ inputs.version || github.ref_name }}
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk "dist/light-keyboard-${VERSION}.apk"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version || github.ref_name }}
          files: dist/light-keyboard-*.apk
          generate_release_notes: true
