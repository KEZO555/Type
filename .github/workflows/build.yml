name: Build

# Builds, unit-tests and lints the app on every push and pull request, and uploads the debug APK as a
# downloadable artifact so it can be sideloaded for real-device testing. (Signed release APKs are built
# separately by release.yml on version tags.)
on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Unit tests
        run: ./gradlew :app:testDebugUnitTest

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Android lint
        run: ./gradlew :app:lintDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: light-keyboard-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
